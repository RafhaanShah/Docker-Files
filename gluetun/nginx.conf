user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

stream {
    # Route DNS lookups to Gluetun's local encrypted DNS resolver
    resolver 127.0.0.1 valid=30s;
    resolver_timeout 5s;

    server {
        listen 443;
        ssl_preread on;
        
        # Extract the target domain from the SNI header and forward the raw stream
        proxy_pass $ssl_preread_server_name:443;
        
        proxy_connect_timeout 10s;
        proxy_timeout 60s;
    }
}
